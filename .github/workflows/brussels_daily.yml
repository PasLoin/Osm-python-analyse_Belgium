name: Daily Brussels PBF Extract (SliceOSM)

on:
  schedule:
    - cron: "30 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-brussels:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq osmium-tool
          pip install shapely

      - name: Run SliceOSM extraction + boundary clip
        run: python pbf_analyse/extract_brussels_daily.py

      - name: Generate history-list.json
        run: python pbf_analyse/generate_history_list.py

      - name: Commit & push
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add pbf_analyse/history/Brussels-daily.pbf pbf_analyse/history/state.txt pbf_analyse/history-list.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Daily Brussels PBF extract – $(date -u +%Y-%m-%d)"
          git push
