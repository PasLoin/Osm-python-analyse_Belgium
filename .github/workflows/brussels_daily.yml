name: Daily Brussels PBF Extract (SliceOSM)

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-brussels:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip install needed – script uses only stdlib

      - name: Run SliceOSM extraction
        run: python pbf_analyse/extract_brussels_daily.py

      - name: Commit & push
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add pbf_analyse/history/Brussels-daily.pbf pbf_analyse/history/state.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Daily Brussels PBF extract – $(date -u +%Y-%m-%d)"
          git push
