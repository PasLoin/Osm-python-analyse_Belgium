name: "Bulles à verre — OpenData vs OSM"

# Déclenchement manuel uniquement (à la demande)
on:
  workflow_dispatch:
    inputs:
      match_threshold_m:
        description: "Seuil d'appariement spatial (mètres)"
        required: false
        default: "50"
        type: string

permissions:
  contents: read

jobs:
  compare:
    name: "Comparaison OpenData ↔ OSM"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout () ─────────────────────────────────
      - name: " Checkout du dépôt "
        uses: actions/checkout@v5
        with:
          lfs: true       # 
          fetch-depth: 1  #

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: " Mise en place de Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dépendances ─────────────────────────────────────────────────────
      - name: "  Installation des dépendances Python"
        run: |
          pip install --upgrade pip
          # osmium  → pyosmium (lecture des fichiers PBF OSM)
          # requests → téléchargement de l'OpenData
          pip install osmium requests

      # ── 4. Lancement du script ─────────────────────────────────────────────
      - name: "🔍  Comparaison OpenData ↔ OSM"
        env:
          MATCH_THRESHOLD_M: ${{ inputs.match_threshold_m }}
        run: |
          python amenity/recycling-netbrussels-opendata-compare-osm.py

      # ── 5. Publication des rapports en tant qu'artefacts GitHub ────────────
      - name: "  Upload des rapports (artefacts)"
        if: always()   # même si le script échoue partiellement
        uses: actions/upload-artifact@v4
        with:
          name: "glass-bins-report-${{ github.run_number }}"
          path: |
            amenity/report_glass_bins.txt
            amenity/report_glass_bins.json
          retention-days: 90
