name: "Bulles a verre - OpenData vs OSM"

# 
on:
  workflow_dispatch:
    inputs:
      match_threshold_m:
        description: "Seuil d'appariement spatial (metres)"
        required: false
        default: "50"
        type: string

permissions:
  contents: read

jobs:
  compare:
    name: "Comparaison OpenData vs OSM"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout du depot"
        uses: actions/checkout@v5
        with:
          lfs: true       # 
          fetch-depth: 1  # h

      - name: "Mise en place de Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Installation des dependances Python"
        run: |
          pip install --upgrade pip
          pip install osmium requests

      - name: "Comparaison OpenData vs OSM"
        env:
          MATCH_THRESHOLD_M: ${{ inputs.match_threshold_m }}
        run: |
          python amenity/recycling-netbrussels-opendata-compare-osm.py

      - name: "Upload des rapports (artefacts)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "glass-bins-report-${{ github.run_number }}"
          path: |
            amenity/report_glass_bins.txt
            amenity/report_glass_bins.json
            amenity/missing_from_osm.geojson
            amenity/needs_glass_tag.geojson
            amenity/missing_from_opendata.geojson
          retention-days: 90
