name: associatedStreet Check
on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:
jobs:
  check-associated-streets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmium2-dev libgdal-dev g++ python3-dev
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install osmium
      - name: Run Check
        run: python3 QA/check-associated-streets.py
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: associated-streets-report
          path: associated-streets-report.txt
          retention-days: 30
